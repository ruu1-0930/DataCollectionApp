# Lanya 后端 nginx 反向代理配置
# 放到 /etc/nginx/sites-available/lanya，再软链到 sites-enabled 启用。
#
# HTTPS(443) 版本：域名 api.sarcopenianus.com，阿里云免费 DV 证书（DigiCert）。
# 证书有效期 3 个月（到期前需在阿里云重新申请/下载并替换 /etc/nginx/ssl 下两个文件）。
# 前提：① 域名已备案（大陆 ECS 必须）；② 安全组放行 443；③ 证书已上传到 /etc/nginx/ssl/。

server {
    listen 80;
    server_name api.sarcopenianus.com;
    return 301 https://$host$request_uri;     # http 全部跳转 https
}

server {
    listen 443 ssl;
    server_name api.sarcopenianus.com;

    ssl_certificate     /etc/nginx/ssl/api.sarcopenianus.com.pem;   # 阿里云下载的证书链
    ssl_certificate_key /etc/nginx/ssl/api.sarcopenianus.com.key;   # 私钥（chmod 600，勿入 git）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m; # 允许上传较大图片

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：上传的静态文件直接由 nginx 提供，省一次 Flask 转发
    # location /uploads/ {
    #     alias /opt/lanya/back/uploads/;
    # }
}
