# Lanya 后端 nginx 反向代理配置
# 放到 /etc/nginx/sites-available/lanya，再软链到 sites-enabled 启用。
#
# 当前为 HTTP(80) 版本，先让系统可达。
# 等域名备案 + SSL 证书就绪后，改用下方注释里的 HTTPS(443) 版本。

server {
    listen 80;
    server_name _;            # 暂用 _；有域名后改成 api.你的域名.com

    client_max_body_size 50m; # 允许上传较大图片

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：上传的静态文件直接由 nginx 提供，省一次 Flask 转发
    # location /uploads/ {
    #     alias /opt/lanya/back/uploads/;
    # }
}

